<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARGAM — Cosmic Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="mainAudio" crossorigin="anonymous"></audio>

    <!-- Starfield Canvas -->
    <canvas id="starCanvas"></canvas>

    <!-- Mood overlay -->
    <div id="moodOverlay" class="mood-overlay"></div>

    <header class="hero-section">
        <div class="hero-content">

            <div class="brand fade-in">
                <span class="brand-dot"></span>
                <h1>SARGAM</h1>
                <span class="brand-dot"></span>
            </div>
            <p class="sub-text fade-in" id="moodLabel">🌌 Initialising Galaxy...</p>

            <!-- Player Card -->
            <div class="player-card fade-in">

                <!-- Visualizer -->
                <div class="visualizer-wrapper">
                    <canvas id="visualizerCanvas"></canvas>
                    <div class="disc-wrapper">
                        <div id="vinylDisk" class="vinyl-disc">
                            <div class="vinyl-inner-ring"></div>
                            <div class="vinyl-sticker" id="stickerEmoji">🎵</div>
                        </div>
                    </div>
                </div>

                <!-- Track Info -->
                <div class="track-info">
                    <div class="now-playing-title" id="playerTitle">No Song Playing</div>
                    <div class="now-playing-artist" id="playerArtist">Select a song below</div>
                </div>

                <!-- Timeline -->
                <div class="timeline-container" id="timelineContainer">
                    <div class="timeline-filled" id="timelineFilled"></div>
                </div>
                <div class="time-stamps">
                    <span id="timeCurrent">0:00</span>
                    <span id="timeTotal">0:00</span>
                </div>

                <!-- Controls -->
                <div class="playback-controls">
                    <button class="control-btn" id="prevBtn" title="Previous">&#9664;&#9664;</button>
                    <button class="control-btn play-toggle" id="playButton">&#9654;</button>
                    <button class="control-btn" id="nextBtn" title="Next">&#9654;&#9654;</button>
                </div>

            </div>
        </div>
    </header>

    <!-- Mood badge -->
    <div class="mood-banner" id="moodBanner">
        <span id="moodBannerText">🌾 Punjabi Beats</span>
    </div>

    <main>
        <section class="playlist-section">
            <div class="section-header">
                <span class="section-icon">🌾</span>
                <h2>Bollywood</h2>
                <span class="section-tag mood-punjabi-tag">GOLDEN</span>
            </div>
            <div id="playlist-Bollywood" class="playlist-grid"></div>
        </section>

        <section class="playlist-section">
            <div class="section-header">
                <span class="section-icon">🎬</span>
                <h2>Punjabi</h2>
                <span class="section-tag mood-bollywood-tag">CINEMA</span>
            </div>
            <div id="playlist-Punjabi" class="playlist-grid"></div>
        </section>

        <section class="playlist-section">
            <div class="section-header">
                <span class="section-icon">🎧</span>
                <h2>English</h2>
                <span class="section-tag mood-english-tag">OCEAN</span>
            </div>
            <div id="playlist-English" class="playlist-grid"></div>
        </section>
    </main>

    <footer>
        <div class="footer-glow"></div>
        <p class="footer-brand">SARGAM</p>
        <p class="footer-sub">Private Cosmic Player — Built by Evaan </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
