<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&amp;family=Instrument+Serif:ital@0;1&amp;display=swap">
    <title>SARGAM — Your Cosmic Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="mainAudio" crossorigin="anonymous"></audio>

    <!-- Nebula background canvas -->
    <canvas id="nebulaCanvas"></canvas>

    <!-- Page enters invisible, JS triggers the drift-in -->
    <div id="appShell" class="app-shell">

        <!-- ── HERO ── -->
        <header class="hero">

            <!-- Brand drifts in from top -->
            <div class="brand drift-top" id="brand">
                <span class="brand-line"></span>
                <div class="brand-text">
                    <span class="brand-sub">✦ private cosmic player ✦</span>
                    <h1 class="brand-title">SARGAM</h1>
                </div>
                <span class="brand-line"></span>
            </div>

            <!-- Mood label drifts in from left -->
            <div class="mood-pill drift-left" id="moodPill">
                <span class="mood-dot" id="moodDot"></span>
                <span id="moodLabel">Initialising...</span>
            </div>

            <!-- Player card drifts in from right -->
            <div class="player-card drift-right float-idle" id="playerCard">

                <!-- Glow ring reacts to beat -->
                <div class="beat-ring" id="beatRing"></div>

                <!-- Visualizer + Disc -->
                <div class="disc-stage">
                    <canvas id="vizCanvas"></canvas>
                    <div class="vinyl" id="vinylDisk">
                        <div class="vinyl-groove vinyl-groove-1"></div>
                        <div class="vinyl-groove vinyl-groove-2"></div>
                        <div class="vinyl-groove vinyl-groove-3"></div>
                        <div class="vinyl-center" id="stickerEmoji">🎵</div>
                    </div>
                </div>

                <!-- Track info — animates on change -->
                <div class="track-info-wrap">
                    <div class="track-info" id="trackInfo">
                        <div class="track-title" id="playerTitle">No Song Playing</div>
                        <div class="track-artist" id="playerArtist">Select a track below</div>
                    </div>
                </div>

                <!-- Timeline -->
                <div class="timeline-wrap">
                    <div class="timeline" id="timelineContainer">
                        <div class="timeline-fill" id="timelineFilled"></div>
                        <div class="timeline-thumb" id="timelineThumb"></div>
                    </div>
                    <div class="timestamps">
                        <span id="timeCurrent">0:00</span>
                        <span id="timeTotal">0:00</span>
                    </div>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="ctrl-btn" id="prevBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                    </button>
                    <button class="ctrl-btn ctrl-play" id="playButton">
                        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button class="ctrl-btn" id="nextBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.17 2.14L8 14.14V9.86zM16 6h2v12h-2z"/></svg>
                    </button>
                </div>

            </div><!-- /player-card -->

        </header>

        <!-- ── PLAYLIST SECTIONS ── -->
        <main class="main drift-bottom" id="mainContent">

            <section class="pl-section">
                <div class="pl-header">
                    <span class="pl-icon">🎬</span>
                    <h2 class="pl-title">Bollywood</h2>
                    <span class="pl-chip chip-Bollywood">ਬਾਲੀਵੁੱਡ</span>
                </div>
                <div class="pl-grid" id="playlist-Bollywood"></div>
            </section>

            <section class="pl-section">
                <div class="pl-header">
                    <span class="pl-icon">🌾</span>
                    <h2 class="pl-title">Punjabi</h2>
                    <span class="pl-chip chip-Punjabi">ਪੰਜਾਬੀ</span>
                </div>
                <div class="pl-grid" id="playlist-Punjabi"></div>
            </section>

            <section class="pl-section">
                <div class="pl-header">
                    <span class="pl-icon">🎧</span>
                    <h2 class="pl-title">English</h2>
                    <span class="pl-chip chip-English">ਅੰਗਰੇਜ਼ੀ</span>
                </div>
                <div class="pl-grid" id="playlist-English"></div>
            </section>

        </main>

        <footer class="footer drift-bottom">
            <div class="footer-rule"></div>
            <p class="footer-name">SARGAM</p>
            <p class="footer-tagline">By Evaan</p>
        </footer>

    </div><!-- /appShell -->

    <script src="script.js"></script>
</body>
</html>
