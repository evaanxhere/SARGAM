<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suno Vibes - My Playlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="mainAudio"></audio>

    <header class="hero-section">
        <div class="hero-content">
            <h1 class="fade-in">Suno Vibes 🎧</h1>
            <p class="fade-in sub-text">Select any song below to start playing!</p>
            
            <div class="player-card fade-in">
                
                <div class="disc-wrapper">
                    <div id="vinylDisk" class="vinyl-disc">
                        <div class="vinyl-sticker" id="stickerEmoji">🎵</div>
                    </div>
                </div>

                <div class="now-playing-title" id="playerTitle">No Song Playing</div>
                <div class="now-playing-artist" id="playerArtist">Select a song below</div>

                <div class="timeline-container" id="timelineContainer">
                    <div class="timeline-filled" id="timelineFilled"></div>
                </div>
                <div class="time-stamps">
                    <span id="timeCurrent">0:00</span>
                    <span id="timeTotal">0:00</span>
                </div>

                <div class="playback-controls">
                    <button class="control-btn" id="prevBtn"><</button>
                    <button class="control-btn play-toggle" id="playButton">▶</button>
                    <button class="control-btn" id="nextBtn">></button>
                </div>

            </div>
        </div>
    </header>

    <main>
        <section class="story-section is-visible">
            <div class="content-box">
                <h2>Punjabi Beats 🌾</h2>
                <div id="playlist-punjabi"></div>
            </div>
        </section>

        <section class="story-section is-visible">
            <div class="content-box">
                <h2>Bollywood 90s 🎬</h2>
                <div id="playlist-bollywood"></div>
            </div>
        </section>

        <section class="story-section is-visible">
            <div class="content-box">
                <h2>Old Punjabi / English 🎧</h2>
                <div id="playlist-english"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>Private Custom Player Dashboard</p>
        <p style="font-size: 0.75rem; margin-top: 5px;">Created with Retro Aesthetic Theme</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
